<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yokuru</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAFAFA;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    p {
      margin-top: 8px;
      color: #888;
      font-size: 14px;
    }
    .links {
      margin-top: 24px;
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .links a {
      color: #111;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border: 1.5px solid #ddd;
      border-radius: 999px;
      transition: all 0.15s;
    }
    .links a:hover {
      border-color: #ABF600;
      background: #ABF600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>yokuru</h1>
    <p>Tools that just work.</p>
    <div class="links">
      <a href="/yt-transcript/privacy">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
